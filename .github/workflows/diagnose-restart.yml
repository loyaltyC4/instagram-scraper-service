name: Diagnose and Restart Container

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "=== All containers (running + stopped) ==="
            docker ps -a

            echo "=== Container logs (last 40 lines) ==="
            docker logs $(docker ps -aq --filter name=instagram) --tail 40 2>&1 || \
            docker logs $(docker ps -aq | head -1) --tail 40 2>&1 || \
            echo 'No containers found'

            echo "=== Disk space ==="
            df -h /

            echo "=== Port 3001 listener ==="
            ss -tlnp | grep 3001 || echo 'Nothing listening on 3001'

            echo "=== Restart container if stopped ==="
            CONTAINER=$(docker ps -aq --filter name=instagram | head -1)
            if [ -n "$CONTAINER" ]; then
              STATUS=$(docker inspect --format '{{.State.Status}}' $CONTAINER)
              echo "Container $CONTAINER status: $STATUS"
              if [ "$STATUS" != "running" ]; then
                echo "Restarting container..."
                docker start $CONTAINER
                sleep 5
              fi
            else
              echo "No instagram container found - trying to start from image"
              docker images | grep instagram
            fi

            echo "=== Final container state ==="
            docker ps

            echo "=== Health check after restart ==="
            sleep 3
            curl -s http://localhost:3001/health --max-time 10 || echo 'Health check failed'
