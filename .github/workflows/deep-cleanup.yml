name: Deep Cleanup

on:
  workflow_dispatch:

jobs:
  deep-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 15m
          script: |
            echo "=== BEFORE ==="
            df -h /

            echo ""
            echo "=== 1. Docker prune (images + containers + build cache) ==="
            docker system prune -af --volumes 2>/dev/null && echo "Docker pruned" || echo "Docker not running"

            echo ""
            echo "=== 2. Clear journal logs (keep last 50MB) ==="
            journalctl --vacuum-size=50M 2>/dev/null || true
            find /var/log -name "*.gz" -delete 2>/dev/null || true
            find /var/log -name "*.1" -delete 2>/dev/null || true
            truncate -s 0 /var/log/syslog 2>/dev/null || true
            truncate -s 0 /var/log/auth.log 2>/dev/null || true

            echo ""
            echo "=== 3. What is in /root (top subdirs) ==="
            du -sh /root/* 2>/dev/null | sort -rh | head -10

            echo ""
            echo "=== 4. Clear root-level build artifacts ==="
            rm -rf /root/.cloakbrowser 2>/dev/null && echo "Removed .cloakbrowser" || true
            rm -rf /root/.cache 2>/dev/null && echo "Removed .cache" || true
            rm -rf /root/.npm 2>/dev/null && echo "Removed .npm" || true
            rm -rf /tmp/* 2>/dev/null || true

            echo ""
            echo "=== 5. Remove unused snap packages ==="
            snap list 2>/dev/null | tail -n +2 | awk "{print \}" || true

            echo ""
            echo "=== 6. Apt cleanup ==="
            apt-get autoremove -y 2>/dev/null || true
            apt-get clean 2>/dev/null || true

            echo ""
            echo "=== AFTER ==="
            df -h /
            echo ""
            echo "=== Space recovered! ==="
