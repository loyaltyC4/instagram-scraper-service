name: Deploy to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 20m
          script_stop: true
          script: |
            echo "=== Step 1: SSH key ===" 
            mkdir -p ~/.ssh
            KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJZUmgl3/FKZ4L0SkImKAZYUf3k2cwOLfPgw3SqtChTE hyperagent-deploy"
            grep -qF "$KEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$KEY" >> ~/.ssh/authorized_keys
            chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys
            echo "Key OK"

            echo "=== Step 2: Disk ==="
            df -h /

            echo "=== Step 3: Node.js ==="
            if ! command -v node > /dev/null 2>&1; then
              echo "Installing Node.js 18..."
              curl -fsSL https://deb.nodesource.com/setup_18.x -o /tmp/nodesource_setup.sh
              bash /tmp/nodesource_setup.sh
              apt-get install -y nodejs
            fi
            echo "Node: $(node --version)"

            echo "=== Step 4: PM2 ==="
            command -v pm2 > /dev/null 2>&1 || npm install -g pm2
            echo "PM2: $(pm2 --version)"

            echo "=== Step 5: Repo ==="
            if [ -d /opt/instagram-scraper-service ]; then
              cd /opt/instagram-scraper-service
              git pull
            else
              git clone https://github.com/loyaltyC4/instagram-scraper-service.git /opt/instagram-scraper-service
              cd /opt/instagram-scraper-service
            fi

            echo "=== Step 6: Dependencies ==="
            cd /opt/instagram-scraper-service
            npm install --omit=dev

            echo "=== Step 7: CloakBrowser ==="
            CLOAKBROWSER_INSTALLED=false
            ls node_modules/cloakbrowser/bin/ > /dev/null 2>&1 && CLOAKBROWSER_INSTALLED=true
            ls /root/.cloakbrowser/chromium/ > /dev/null 2>&1 && CLOAKBROWSER_INSTALLED=true
            if [ "$CLOAKBROWSER_INSTALLED" = "false" ]; then
              echo "Installing CloakBrowser..."
              npx cloakbrowser install
              pkill -f "cloakbrowser.*update" 2>/dev/null || true
              rm -rf /root/.cloakbrowser/*.tar.gz /tmp/cloakbrowser* 2>/dev/null || true
              echo "CloakBrowser installed"
            else
              echo "CloakBrowser already installed, skipping"
            fi

            echo "=== Step 8: Start service ==="
            mkdir -p /opt/instagram-scraper-service/.sessions/instagram
            cd /opt/instagram-scraper-service
            pm2 startOrRestart ecosystem.config.cjs --env production
            pm2 save
            echo "Service started"

            echo "=== Step 9: Health check ==="
            sleep 3
            curl -sf http://localhost:3001/health && echo "Health OK" || echo "Health check failed (may still be starting)"

            echo "=== Done ==="
            df -h /
