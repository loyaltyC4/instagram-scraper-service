name: Deploy to Hetzner

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 20m
          script: |
            set -e

            # Add deploy SSH key for future keyless access
            mkdir -p ~/.ssh
            KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJZUmgl3/FKZ4L0SkImKAZYUf3k2cwOLfPgw3SqtChTE hyperagent-deploy"
            grep -qF "$KEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$KEY" >> ~/.ssh/authorized_keys
            chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys

            echo "=== Disk before ==="
            df -h /

            # Install Node.js 18 if missing
            if ! command -v node &> /dev/null; then
              echo "Installing Node.js 18..."
              curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
              apt-get install -y nodejs
            fi
            echo "Node: $(node --version)"

            # Install PM2 if missing
            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2..."
              npm install -g pm2
            fi
            echo "PM2: $(pm2 --version)"

            # Clone or update repo
            if [ -d /opt/instagram-scraper-service ]; then
              echo "Updating repo..."
              cd /opt/instagram-scraper-service && git pull
            else
              echo "Cloning repo..."
              git clone https://github.com/loyaltyC4/instagram-scraper-service.git /opt/instagram-scraper-service
              cd /opt/instagram-scraper-service
            fi

            cd /opt/instagram-scraper-service

            # Install npm deps
            echo "Installing npm packages..."
            npm install --omit=dev

            # Install CloakBrowser (skip if already installed)
            if [ ! -f node_modules/.bin/cloakbrowser ] && [ ! -d /root/.cloakbrowser/chromium ]; then
              echo "Installing CloakBrowser..."
              npx cloakbrowser install
              # Kill background auto-updater to prevent disk fill
              pkill -f cloakbrowser 2>/dev/null || true
              rm -rf /root/.cloakbrowser/*.tar.gz /root/.cloakbrowser/updates /tmp/cloakbrowser* 2>/dev/null || true
            else
              echo "CloakBrowser already installed, skipping."
            fi

            # Create sessions directory
            mkdir -p /opt/instagram-scraper-service/.sessions/instagram

            # Set env vars and start/restart with PM2
            export SCRAPER_SECRET=ScR4p3rS3cr3t2024
            export PORT=3001
            export NODE_ENV=production

            pm2 describe instagram-scraper > /dev/null 2>&1 && \
              pm2 restart instagram-scraper --update-env || \
              pm2 start src/server.js \
                --name instagram-scraper \
                --restart-delay=3000 \
                --max-restarts=10 \
                -- 

            # Save PM2 config so it restarts on reboot
            pm2 save
            pm2 startup systemd -u root --hp /root 2>/dev/null | tail -1 | bash 2>/dev/null || true

            sleep 3
            echo ""
            echo "=== Health check ==="
            curl -s http://localhost:3001/health || echo 'Health check failed'
            echo ""
            echo "=== PM2 status ==="
            pm2 list
            echo ""
            echo "=== Disk after ==="
            df -h /
            echo ""
            echo "Deploy complete!"
