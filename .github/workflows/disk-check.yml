name: Disk Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check disk via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 2m
          script: |
            echo "=== DISK ==="
            df -h /
            echo ""
            echo "=== DOCKER ==="
            docker system df 2>/dev/null || echo 'docker not running'
            echo ""
            echo "=== TOP /root ==="
            du -sh /root/* 2>/dev/null | sort -rh | head -10
            echo ""
            echo "=== REPO STATE ==="
            ls /opt/instagram-scraper-service 2>/dev/null && echo 'REPO EXISTS' || echo 'REPO NOT CLONED'
