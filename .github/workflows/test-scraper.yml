name: Test Scraper

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to test (stories, followers, following, profile)'
        required: true
        default: 'stories'
      username:
        description: 'Instagram username to test'
        required: true
        default: 'natgeotv'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test scraper endpoint
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            SECRET=$(docker exec instagram-scraper printenv SCRAPER_SECRET)
            echo "Testing action=${{ github.event.inputs.action }} username=${{ github.event.inputs.username }}"
            curl -s -m 120 \
              -X POST \
              -H "Content-Type: application/json" \
              -H "X-Secret: $SECRET" \
              -d '{"action":"${{ github.event.inputs.action }}","payload":{"username":"${{ github.event.inputs.username }}"}}' \
              "http://localhost:3001/scrape" \
              | python3 -c "
import json, sys
try:
    data = json.load(sys.stdin)
    if isinstance(data, dict):
        if 'error' in data:
            print(f'Error: {data["error"]}')
        elif 'items' in data:
            items = data['items']
            print(f'Success: {len(items)} items')
            if len(items) > 0:
                print('First item:', json.dumps(items[0], indent=2)[:800])
        else:
            print('Response:', json.dumps(data, indent=2)[:1000])
    elif isinstance(data, list):
        print(f'Result: {len(data)} items')
        if len(data) > 0:
            print('First item:', json.dumps(data[0], indent=2)[:800])
    else:
        print('Result:', data)
except Exception as e:
    print(f'Parse error: {e}')
    print('Raw:', sys.stdin.read()[:500])
"
